resources:
  jobs:
    daily_transacciones_retail:
      name: daily_transacciones_retail
      description: |
        El workflow ejecutado de manera diaria
      tasks:
        - task_key: bronze_load
          notebook_task:
            notebook_path: ../src/daily_transacciones_retail/s9_bronze
          min_retry_interval_millis: 900000
          disable_auto_optimization: true
        - task_key: silver_transform
          depends_on:
            - task_key: bronze_load
          notebook_task:
            notebook_path: ../src/daily_transacciones_retail/s9_silver
        - task_key: gold_aggregated
          depends_on:
            - task_key: silver_transform
          notebook_task:
            notebook_path: ../src/daily_transacciones_retail/s9_gold
      git_source:
        git_url: https://github.com/alonso2295/dbassociate.git
        git_provider: gitHub
        git_branch: main
      tags:
        criticidad: alta
        squad: underworld
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED

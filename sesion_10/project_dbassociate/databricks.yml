# This is a Databricks asset bundle definition for project_dbassociate.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: project_dbassociate
  uuid: fa28d7a5-0910-4c9a-beb6-b4dd08c95ce1

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405616475566169.9.azuredatabricks.net
    variables:
      catalog: dbassociate
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://adb-7405616475566169.9.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/docjmedina@dmclatam.onmicrosoft.com to make sure we only have a single copy.
      root_path: /Workspace/Users/docjmedina@dmclatam.onmicrosoft.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: dbassociate
      schema: ${workspace.current_user.short_name}
    permissions:
      - user_name: docjmedina@dmclatam.onmicrosoft.com
        level: CAN_MANAGE

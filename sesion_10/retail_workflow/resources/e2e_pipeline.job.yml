resources:
  jobs:
    e2e_pipeline:
      name: e2e_pipeline
      schedule:
        quartz_cron_expression: 9 30 1 * * ?
        timezone_id: America/Lima
        pause_status: UNPAUSED
      tasks:
        - task_key: bronze_load
          notebook_task:
            notebook_path: sesion_09/s9_bronze
            source: GIT
            base_parameters:
              "1": "2"
          min_retry_interval_millis: 900000
          disable_auto_optimization: true
        - task_key: gold_aggregated
          depends_on:
            - task_key: silver_transform
          notebook_task:
            notebook_path: sesion_09/s9_gold
            source: GIT
          min_retry_interval_millis: 900000
          disable_auto_optimization: true
        - task_key: silver_transform
          depends_on:
            - task_key: bronze_load
          notebook_task:
            notebook_path: sesion_09/s9_silver
            source: GIT
          min_retry_interval_millis: 900000
          disable_auto_optimization: true
        - depends_on:
            - task_key: gold_aggregated
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_yelp_project.id}
          task_key: yelp_pipeline
      git_source:
        git_url: https://github.com/alonso2295/dbassociate.git
        git_provider: gitHub
        git_branch: main
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED

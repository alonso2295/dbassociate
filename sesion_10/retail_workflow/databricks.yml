# This is a Databricks asset bundle definition for retrail_workflow.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: retrail_workflow
  uuid: 6cce3c07-2550-4d32-a6b8-53d871000645

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

  bronze_schema:
    description: Esquema de la capa bronze
  silver_schema:
    description: Esquema de la capa silver
  gold_schema:
    description: Esquema de la capa gold

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-ad9f621f-e340.cloud.databricks.com
    variables:
      catalog: dbassociate
      schema: default
      bronze_schema: bronze_dev
      silver_schema: silver_dev
      gold_schema: gold_dev

  prod:
    mode: production
    workspace:
      host: https://dbc-ad9f621f-e340.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/jamd221195@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/jamd221195@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: dbassociate
      schema: prod
      bronze_schema: bronze
      silver_schema: silver
      gold_schema: gold
    permissions:
      - user_name: jamd221195@gmail.com
        level: CAN_MANAGE
